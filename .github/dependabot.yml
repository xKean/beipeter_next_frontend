version: 2
updates:
  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    # Wait after a version is published before opening a PR. Lets early
    # adopters surface bugs first; majors wait a full month.
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      # Bundle non-major updates into one PR to cut noise
      minor-and-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Berlin
    cooldown:
      default-days: 7
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions:
        update-types:
          - minor
          - patch
